name: MyRadio monitor

# Checks that MyRadio actually works on every push / PR to main, plus a daily
# safety run. Runs the full monitor: unit tests, web syntax, backend boot,
# onboarding -> session-plan, playable audio, feedback loop.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 15 * * *" # 08:00 PT daily safety net
  workflow_dispatch:
    inputs:
      selftest_fail:
        description: "Force a failure to test the Slack alert"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level env so it's visible in step `if:` conditions (step-level env is not).
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run MyRadio monitor
        env:
          MONITOR_SELFTEST_FAIL: ${{ inputs.selftest_fail == true && '1' || '' }}
        run: |
          set -o pipefail
          # Save the JSON report even on failure, then gate the job on it.
          node monitor/check.mjs --json | tee monitor-report.json || true
          node -e "const s=require('./monitor-report.json').status; console.log('overall:', s); process.exit(s === 'BROKEN' ? 1 : 0)"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report
          path: monitor-report.json

      # Slack alert on failure. The script no-ops if SLACK_WEBHOOK_URL is empty,
      # so this is safe to always run (secret-derived env isn't reliable in `if`).
      - name: Notify Slack on failure
        if: failure()
        run: node monitor/notify-slack.mjs "$SLACK_WEBHOOK_URL"
